# =========================
# WEATHER DATA FROM HOME ASSISTANT (OpenWeatherMap)
# =========================

# =========================
# GUARD GLOBAL
# =========================
# Prevents the feedback loop described in esphome/esphome#17161:
# lvgl.widget.update on a `switch` widget fires on_value even when the
# update is programmatic (e.g. mirroring HA state). Without this guard,
# every HA-side state change (including from other automations) gets
# echoed straight back to HA as a toggle, causing the light to "fight"
# with whatever automation just changed it.
globals:
  - id: mirroring_light_switches
    type: bool
    restore_value: no
    initial_value: 'false'

# =========================
# SCRIPTS
# =========================
script:
  # Turn the display backlight on/off based on motion OR ceiling light.
  # Screen is on when motion is detected OR the ceiling light is on; otherwise off.
  - id: update_screen_state
    then:
      - if:
          condition:
            lambda: 'return id(motion_occupancy).state || id(ceiling_light_on).state;'
          then:
            - light.turn_on: back_light
          else:
            - light.turn_off: back_light

  # Wake the screen on touch and keep it awake for the configured timeout.
  # mode restart -> each touch restarts the timer.
  # After the timeout, re-evaluate: if motion/light keep it on, it stays on; otherwise off.
  - id: wake_screen
    mode: restart
    then:
      - light.turn_on: back_light
      - delay: !lambda 'return id(screen_timeout) * 1000;'
      - script.execute: update_screen_state

text_sensor:
  # Weather condition
  - platform: homeassistant
    id: ha_weather_condition
    entity_id: weather.openweathermap
    on_value:
      then:
        # Update condition name (capitalize first letter)
        - lvgl.label.update:
            id: lbl_weather_forecast_condition_name
            text: !lambda |-
              std::string condition = x;
              if (!condition.empty()) {
                condition[0] = toupper(condition[0]);
              }
              return condition.c_str();
        
        # Update weather icon
        - lvgl.label.update:
            id: lbl_weather_forecast_condition_icon
            text: !lambda |-
              std::map<std::string, std::string> weather_icons = {
                {"clear-night", "\U000F0594"},
                {"cloudy", "\U000F0590"},
                {"exceptional", "\U000F0F2F"},
                {"fog", "\U000F0591"},
                {"hail", "\U000F0592"},
                {"lightning", "\U000F0593"},
                {"lightning-rainy", "\U000F067E"},
                {"partlycloudy", "\U000F0595"},
                {"pouring", "\U000F0596"},
                {"rainy", "\U000F0597"},
                {"snowy", "\U000F0598"},
                {"snowy-rainy", "\U000F067F"},
                {"sunny", "\U000F0599"},
                {"windy", "\U000F059D"},
                {"windy-variant", "\U000F059E"}
              };
              
              std::string condition = x;
              if (weather_icons.count(condition)) {
                return weather_icons[condition].c_str();
              }
              return "\U000F0599";

  # Fan speed state sync (off/low/mid/high) from iFan03's clean text sensor.
  # This reliably highlights the active fan button in red regardless of
  # who changed the fan (display, physical remote, or HA automation).
  - platform: homeassistant
    id: ha_fan_speed_state
    entity_id: sensor.master_bedroom_sonoff_ifan_ifan03_masterbedroom_fan_speed_state
    on_value:
      then:
        # Reset all buttons to default style
        - lvgl.widget.update:
            id: fan_off_button
            bg_color: 0x444444
            bg_opa: COVER
        - lvgl.widget.update:
            id: fan_low_button
            bg_color: 0x444444
            bg_opa: COVER
        - lvgl.widget.update:
            id: fan_mid_button
            bg_color: 0x444444
            bg_opa: COVER
        - lvgl.widget.update:
            id: fan_high_button
            bg_color: 0x444444
            bg_opa: COVER
        # Highlight the active button in red
        - if:
            condition:
              lambda: 'return x == "off";'
            then:
              - lvgl.widget.update:
                  id: fan_off_button
                  bg_color: 0xFF0000
                  bg_opa: COVER
        - if:
            condition:
              lambda: 'return x == "low";'
            then:
              - lvgl.widget.update:
                  id: fan_low_button
                  bg_color: 0xFF0000
                  bg_opa: COVER
        - if:
            condition:
              lambda: 'return x == "mid";'
            then:
              - lvgl.widget.update:
                  id: fan_mid_button
                  bg_color: 0xFF0000
                  bg_opa: COVER
        - if:
            condition:
              lambda: 'return x == "high";'
            then:
              - lvgl.widget.update:
                  id: fan_high_button
                  bg_color: 0xFF0000
                  bg_opa: COVER

  # Cover Open Time helper sync
  - platform: homeassistant
    id: ha_cover_open_time
    entity_id: input_select.master_bedroom_cover_open_time
    on_value:
      then:
        - lvgl.dropdown.update:
            id: cover_morning_dropdown
            selected_index: !lambda |-
              std::vector<std::string> options = {
                "6:00", "6:30", "7:00", "7:30", "8:00",
                "8:30", "9:00", "9:30", "10:00"
              };
              for (size_t i = 0; i < options.size(); i++) {
                if (options[i] == x) return (int)i;
              }
              return 4;  // Default 8:00

  # Cover Close Time helper sync
  - platform: homeassistant
    id: ha_cover_close_time
    entity_id: input_select.master_bedroom_cover_close_time
    on_value:
      then:
        - lvgl.dropdown.update:
            id: cover_evening_dropdown
            selected_index: !lambda |-
              std::vector<std::string> options = {
                "19:00", "19:30", "20:00", "20:30", "21:00",
                "21:30", "22:00", "22:30", "23:00"
              };
              for (size_t i = 0; i < options.size(); i++) {
                if (options[i] == x) return (int)i;
              }
              return 4;  // Default 21:00

  # Climate HVAC mode sync
  - platform: homeassistant
    id: ha_climate_hvac_mode
    entity_id: climate.virtual_thermostat_master_bedroom
    on_value:
      then:
        # Reset all mode buttons
        - lvgl.widget.update:
            id: climate_off_button
            state:
              checked: false
        - lvgl.widget.update:
            id: climate_eco_button
            state:
              checked: false
        - lvgl.widget.update:
            id: climate_warm_button
            state:
              checked: false
        # Highlight Off button if hvac_mode is off
        - if:
            condition:
              lambda: 'return x == "off";'
            then:
              - lvgl.widget.update:
                  id: climate_off_button
                  state:
                    checked: true

  # Climate preset mode sync
  - platform: homeassistant
    id: ha_climate_preset_mode
    entity_id: climate.virtual_thermostat_master_bedroom
    attribute: preset_mode
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "eco";'
            then:
              - lvgl.widget.update:
                  id: climate_eco_button
                  state:
                    checked: true
              - lvgl.widget.update:
                  id: climate_warm_button
                  state:
                    checked: false
        - if:
            condition:
              lambda: 'return x == "comfort";'
            then:
              - lvgl.widget.update:
                  id: climate_warm_button
                  state:
                    checked: true
              - lvgl.widget.update:
                  id: climate_eco_button
                  state:
                    checked: false

# =========================
# HOME ASSISTANT LIGHT STATES
# =========================
# =========================
# BINARY SENSOR (status)
# =========================
binary_sensor:
  - platform: status
    name: Status sensor

  # Motion / occupancy sensor - drives the screen backlight
  - platform: homeassistant
    id: motion_occupancy
    entity_id: binary_sensor.multisensor_6_home_security_motion_detection
    on_state:
      then:
        - script.execute: update_screen_state

  # Main light (plafondlamp) status sync
  - platform: homeassistant
    id: ceiling_light_on
    entity_id: light.sonoff_ifan_ifan03_masterbedroom_light
    on_state:
      then:
        # Guard: this update must not be echoed back to HA via the
        # switch's on_value handler (see esphome/esphome#17161).
        - lambda: 'id(mirroring_light_switches) = true;'
        - lvgl.widget.update:
            id: main_light_switch_main
            state:
              checked: !lambda return x;
            shadow_width: !lambda 'return x ? 15 : 0;'
        # Bulb icon: filled amber when on, grey outline when off
        - lvgl.label.update:
            id: lbl_bulb_main
            text: !lambda 'return std::string(x ? "\U000F0335" : "\U000F0336");'
            text_color: !lambda 'return lv_color_hex(x ? 0xFDB813 : 0xBBBBBB);'
        - lambda: 'id(mirroring_light_switches) = false;'
        # Update screen state (light on -> screen on)
        - script.execute: update_screen_state

  # Left light status sync
  - platform: homeassistant
    id: ha_light_left
    entity_id: light.master_bedroom_light_left
    on_state:
      then:
        # Guard: this update must not be echoed back to HA via the
        # switch's on_value handler (see esphome/esphome#17161).
        - lambda: 'id(mirroring_light_switches) = true;'
        - lvgl.widget.update:
            id: main_light_switch_left
            state:
              checked: !lambda return x;
            shadow_width: !lambda 'return x ? 15 : 0;'
        # Bulb icon: filled amber when on, grey outline when off
        - lvgl.label.update:
            id: lbl_bulb_left
            text: !lambda 'return std::string(x ? "\U000F0335" : "\U000F0336");'
            text_color: !lambda 'return lv_color_hex(x ? 0xFDB813 : 0xBBBBBB);'
        - lambda: 'id(mirroring_light_switches) = false;'

  # Right light status sync
  - platform: homeassistant
    id: ha_light_right
    entity_id: light.master_bedroom_light_right
    on_state:
      then:
        # Guard: this update must not be echoed back to HA via the
        # switch's on_value handler (see esphome/esphome#17161).
        - lambda: 'id(mirroring_light_switches) = true;'
        - lvgl.widget.update:
            id: main_light_switch_right
            state:
              checked: !lambda return x;
            shadow_width: !lambda 'return x ? 15 : 0;'
        # Bulb icon: filled amber when on, grey outline when off
        - lvgl.label.update:
            id: lbl_bulb_right
            text: !lambda 'return std::string(x ? "\U000F0335" : "\U000F0336");'
            text_color: !lambda 'return lv_color_hex(x ? 0xFDB813 : 0xBBBBBB);'
        - lambda: 'id(mirroring_light_switches) = false;'

  # Living room lights status sync (second page)
  - platform: homeassistant
    id: livingroom_light_on
    entity_id: light.livingroom_lights
    on_state:
      then:
        # Guard: this update must not be echoed back to HA via the
        # switch's on_value handler (see esphome/esphome#17161).
        - lambda: 'id(mirroring_light_switches) = true;'
        - lvgl.widget.update:
            id: livingroom_light_switch
            state:
              checked: !lambda return x;
            shadow_width: !lambda 'return x ? 15 : 0;'
        # Bulb icon: filled amber when on, grey outline when off
        - lvgl.label.update:
            id: lbl_bulb_livingroom
            text: !lambda 'return std::string(x ? "\U000F0335" : "\U000F0336");'
            text_color: !lambda 'return lv_color_hex(x ? 0xFDB813 : 0xBBBBBB);'
        - lambda: 'id(mirroring_light_switches) = false;'

  # Cover Default Times boolean sync
  - platform: homeassistant
    id: ha_cover_default
    entity_id: input_boolean.master_bedroom_cover_default_times
    on_state:
      then:
        - lvgl.widget.update:
            id: cover_default_checkbox
            state:
              checked: !lambda return x;

# =========================
# SENSORS FROM HOME ASSISTANT
# =========================
sensor:
  # Current temperature (Now)
  - platform: homeassistant
    id: ha_weather_temp_now
    entity_id: weather.openweathermap
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_outdoor_now
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f °C", x);
              return buf;

  # Feels like temperature
  - platform: homeassistant
    id: ha_weather_feels_like
    entity_id: weather.openweathermap
    attribute: apparent_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_forecast_tempap
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f °C", x);
              return buf;

  # Cloud coverage for Maximum field
  - platform: homeassistant
    id: ha_weather_cloud
    entity_id: weather.openweathermap
    attribute: cloud_coverage
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_forecast_temphi
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%d%%", (int)x);
              return buf;

  # Humidity for Minimum field
  - platform: homeassistant
    id: ha_weather_humidity
    entity_id: weather.openweathermap
    attribute: humidity
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_forecast_templo
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%d%%", (int)x);
              return buf;

    # Wind bearing (richting in graden)
  # Wind speed
  - platform: homeassistant
    id: ha_weather_wind_speed
    entity_id: weather.openweathermap
    attribute: wind_speed
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_wind_speed
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f km/h", x);
              return buf;

  # Cover position sync from HA (inverted display: 0 = open, 100 = closed)
  - platform: homeassistant
    id: ha_cover_position
    entity_id: cover.cover_master_bedroom
    attribute: current_position
    on_value:
      then:
        - lvgl.slider.update:
            id: cover_slider
            value: !lambda 'return 100 - (int)x;'

  # Climate setpoint sync from HA → Display (number only; °C is a separate label)
  - platform: homeassistant
    id: ha_climate_setpoint
    entity_id: climate.virtual_thermostat_master_bedroom
    attribute: temperature
    on_value:
      then:
        - globals.set:
            id: climate_setpoint_value
            value: !lambda 'return x;'
        - lvgl.label.update:
            id: climate_setpoint_label
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f", x);
              return buf;

  # Current temperature
  - platform: homeassistant
    id: ha_climate_current_temp
    entity_id: climate.virtual_thermostat_master_bedroom
    attribute: current_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: climate_current_temp
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f °C", x);
              return buf;
