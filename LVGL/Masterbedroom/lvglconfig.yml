# =========================
# FONTS (buiten lvgl sectie!)
# =========================
font:
  # Kleine iconen voor WiFi/HA status in header
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_24
    size: 24
    bpp: 4
    glyphs: [
      "\U000F07D0", # home-assistant icon
      "\U000F05A9", # wifi
      "\U000F16B5", # wifi-alert
      "\U000F0141", # chevron-left
      "\U000F0142", # chevron-right
      ]

  # Light bulb icons voor Main Light switches
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_28
    size: 28
    bpp: 4
    glyphs: [
      "\U000F0335", # lightbulb (on)
      "\U000F0336", # lightbulb-outline (off)
      ]
  
  # Groot icoon voor weather widget
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_100
    size: 100
    bpp: 4
    glyphs: [
      "\U000F0594", # clear-night
      "\U000F0590", # cloudy
      "\U000F0F2F", # exceptional
      "\U000F0591", # fog
      "\U000F0592", # hail
      "\U000F0593", # lightning
      "\U000F067E", # lightning-rainy
      "\U000F0595", # partlycloudy
      "\U000F0596", # pouring
      "\U000F0597", # rainy
      "\U000F0598", # snowy
      "\U000F067F", # snowy-rainy
      "\U000F0599", # sunny
      "\U000F059D", # windy
      "\U000F059E", # windy-variant
      "\U000F14E4", # sunny-off
      ]
  
  - file: "gfonts://Montserrat@500"
    id: montserrat_14
    size: 14
    bpp: 4
  
  - file: "gfonts://Montserrat@500"
    id: montserrat_16
    size: 16
    bpp: 4

  - file: "gfonts://Montserrat@500"
    id: montserrat_20
    size: 20
    bpp: 4

  - file: "gfonts://Montserrat@500"
    id: montserrat_22
    size: 22
    bpp: 4

# =========================
# LVGL
# =========================
lvgl:
  pages:
    - id: main_page
      bg_color: 0x0B0A0A
      pad_all: 0
      scrollable: false
      scrollbar_mode: "off"

      widgets:

        # =========================
        # HEADER (kleiner HA icoon)
        # =========================
        - obj:
            align: TOP_MID
            styles: header_footer
            width: 100%
            height: 40
            scrollable: false
            scrollbar_mode: "off"

            widgets:
              - label:
                  text: "Master Bedroom Control"
                  align: CENTER
                  text_font: montserrat_22
                  text_color: 0xFFFFFF

              # WiFi connectivity icon - white wifi glyph while connected,
              # red wifi-alert glyph while disconnected. Driven by
              # update_connectivity_icons (see lvglsensors.yml).
              - label:
                  text: "\U000F05A9"
                  id: lbl_wifistatus
                  align: RIGHT_MID
                  x: -95
                  text_font: icons_24
                  text_color: 0xFFFFFF

              # HA connectivity icon - white home-assistant glyph while the
              # device's API connection to Home Assistant is up, red while
              # it's down. Driven by update_connectivity_icons (see
              # lvglsensors.yml).
              - label:
                  text: "\U000F07D0"
                  id: lbl_hastatus
                  align: RIGHT_MID
                  x: -55
                  text_font: icons_24
                  text_color: 0xFFFFFF

              # Page navigation: go to Living Room (next page)
              - button:
                  align: RIGHT_MID
                  x: -5
                  width: 40
                  height: 34
                  bg_opa: TRANSP
                  shadow_width: 0
                  widgets:
                    - label:
                        text: "\U000F0142"
                        align: CENTER
                        text_font: icons_24
                        text_color: 0xFFFFFF
                  on_click:
                    - lvgl.page.show: second_page


        # =========================
        # MAIN GRID
        # =========================
        - obj:
            id: main_grid
            x: 0
            y: 40
            width: 800
            height: 440
            bg_color: 0xD3D6D9
            pad_all: 8
            scrollable: false
            scrollbar_mode: "off"

            layout:
              type: GRID
              pad_row: 8
              pad_column: 8
              grid_rows:
                - FR(1)
              grid_columns:
                - FR(1)
                - FR(1)

            widgets:

              # =========================
              # LEFT COLUMN
              # =========================
              - obj:
                  id: left_col
                  scrollable: false
                  scrollbar_mode: "off"

                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH

                  layout:
                    type: GRID
                    pad_row: 8
                    pad_column: 0
                    grid_rows:
                      - FR(1)
                      - FR(1)
                      - FR(1)
                    grid_columns:
                      - FR(1)

                  widgets:

                    # =========================
                    # MAIN LIGHT
                    # =========================
                    - obj:
                        id: light_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 6
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        widgets:

                          - label:
                              id: main_light_title
                              text: "Main Light"
                              align: TOP_LEFT
                              x: 10
                              y: 5
                              text_font: montserrat_20
                              text_color: 0x0B0A0A

                          # Main light bulb icon
                          - label:
                              id: lbl_bulb_main
                              text: "\U000F0336"
                              align: CENTER
                              x: 20
                              y: -30
                              text_font: icons_28
                              text_color: 0xBBBBBB

                          # Main switch (plafondlamp)
                          - label:
                              text: "Main"
                              align: CENTER
                              x: 60
                              y: -30
                              text_font: montserrat_16
                              text_color: 0x0B0A0A

                          - switch:
                              id: main_light_switch_main
                              align: CENTER
                              x: 130
                              y: -30
                              shadow_color: 0xFDB813
                              shadow_width: 0
                              shadow_spread: 2
                              on_value:
                                # Guard against the mirror-loop caused by
                                # lvgl.widget.update firing on_value
                                # (esphome/esphome#17161). Only forward to HA
                                # when this was a genuine user touch.
                                - if:
                                    condition:
                                      lambda: 'return !id(mirroring_light_switches);'
                                    then:
                                      - homeassistant.action:
                                          action: light.toggle
                                          data:
                                            entity_id: light.sonoff_ifan_ifan03_masterbedroom_light

                          # Left light bulb icon
                          - label:
                              id: lbl_bulb_left
                              text: "\U000F0336"
                              align: CENTER
                              x: 20
                              y: 5
                              text_font: icons_28
                              text_color: 0xBBBBBB

                          # Left switch (linker bedlamp)
                          - label:
                              text: "Left"
                              align: CENTER
                              x: 60
                              y: 5
                              text_font: montserrat_16
                              text_color: 0x0B0A0A

                          - switch:
                              id: main_light_switch_left
                              align: CENTER
                              x: 130
                              y: 5
                              shadow_color: 0xFDB813
                              shadow_width: 0
                              shadow_spread: 2
                              on_value:
                                # Guard against the mirror-loop caused by
                                # lvgl.widget.update firing on_value
                                # (esphome/esphome#17161). Only forward to HA
                                # when this was a genuine user touch.
                                - if:
                                    condition:
                                      lambda: 'return !id(mirroring_light_switches);'
                                    then:
                                      - homeassistant.action:
                                          action: light.toggle
                                          data:
                                            entity_id: light.master_bedroom_light_left

                          # Right light bulb icon
                          - label:
                              id: lbl_bulb_right
                              text: "\U000F0336"
                              align: CENTER
                              x: 20
                              y: 40
                              text_font: icons_28
                              text_color: 0xBBBBBB

                          # Right switch (rechter bedlamp)
                          - label:
                              text: "Right"
                              align: CENTER
                              x: 60
                              y: 40
                              text_font: montserrat_16
                              text_color: 0x0B0A0A

                          - switch:
                              id: main_light_switch_right
                              align: CENTER
                              x: 130
                              y: 40
                              shadow_color: 0xFDB813
                              shadow_width: 0
                              shadow_spread: 2
                              on_value:
                                # Guard against the mirror-loop caused by
                                # lvgl.widget.update firing on_value
                                # (esphome/esphome#17161). Only forward to HA
                                # when this was a genuine user touch.
                                - if:
                                    condition:
                                      lambda: 'return !id(mirroring_light_switches);'
                                    then:
                                      - homeassistant.action:
                                          action: light.toggle
                                          data:
                                            entity_id: light.master_bedroom_light_right

                    # =========================
                    # VENTILATOR
                    # =========================
                    - obj:
                        id: ventilator_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 6
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        widgets:

                          - label:
                              id: ventilator_title
                              text: "Ventilator"
                              align: TOP_LEFT
                              x: 10
                              y: 5
                              text_font: montserrat_20
                              text_color: 0x0B0A0A

                          # OFF button
                          - button:
                              id: fan_off_button
                              width: 75
                              height: 45
                              x: -123
                              y: 25
                              align: CENTER
                              widgets:
                                - label:
                                    text: "OFF"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: fan.turn_off
                                    data:
                                      entity_id: fan.sonoff_ifan_ifan03_masterbedroom_fan

                          # LOW button (speed 1 -> 33%)
                          - button:
                              id: fan_low_button
                              width: 75
                              height: 45
                              x: -41
                              y: 25
                              align: CENTER
                              widgets:
                                - label:
                                    text: "LOW"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: fan.set_percentage
                                    data:
                                      entity_id: fan.sonoff_ifan_ifan03_masterbedroom_fan
                                      percentage: "33"

                          # MID button (speed 2 -> 67%)
                          - button:
                              id: fan_mid_button
                              width: 75
                              height: 45
                              x: 41
                              y: 25
                              align: CENTER
                              widgets:
                                - label:
                                    text: "MID"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: fan.set_percentage
                                    data:
                                      entity_id: fan.sonoff_ifan_ifan03_masterbedroom_fan
                                      percentage: "67"

                          # HIGH button (speed 3 -> 100%)
                          - button:
                              id: fan_high_button
                              width: 75
                              height: 45
                              x: 123
                              y: 25
                              align: CENTER
                              widgets:
                                - label:
                                    text: "HIGH"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: fan.set_percentage
                                    data:
                                      entity_id: fan.sonoff_ifan_ifan03_masterbedroom_fan
                                      percentage: "100"


                    # =========================
                    # COVER
                    # =========================
                    - obj:
                        id: cover_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 12
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 2
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        widgets:

                          # Linksboven: Label "Cover"
                          - label:
                              id: cover_title
                              text: "Cover"
                              align: TOP_LEFT
                              x: 0
                              y: 0
                              text_font: montserrat_20
                              text_color: 0x0B0A0A

                          # Midden: Checkbox "Default"
                          - checkbox:
                              id: cover_default_checkbox
                              align: LEFT_MID
                              x: 0
                              y: 0
                              text: "Default"
                              text_font: montserrat_14
                              on_value:
                                # Guard against the mirror-loop caused by
                                # lvgl.widget.update firing on_value
                                # (esphome/esphome#17161). Only forward to HA
                                # when this was a genuine user touch, not a
                                # programmatic sync from ha_cover_default.
                                - if:
                                    condition:
                                      lambda: 'return !id(mirroring_cover_settings);'
                                    then:
                                      - homeassistant.action:
                                          action: input_boolean.toggle
                                          data:
                                            entity_id: input_boolean.master_bedroom_cover_default_times

                          # Midden: Open dropdown (6:00 - 10:00, elk half uur)
                          - dropdown:
                              id: cover_morning_dropdown
                              align: LEFT_MID
                              x: 100
                              y: 0
                              width: 85
                              options:
                                - "6:00"
                                - "6:30"
                                - "7:00"
                                - "7:30"
                                - "8:00"
                                - "8:30"
                                - "9:00"
                                - "9:30"
                                - "10:00"
                              selected_index: 4  # Default: 8:00
                              on_value:
                                # Guard against the mirror-loop caused by
                                # lvgl.dropdown.update firing on_value
                                # (esphome/esphome#17161). Only forward to HA
                                # when this was a genuine user touch, not a
                                # programmatic sync from ha_cover_open_time /
                                # the cover_default_checkbox handler.
                                - if:
                                    condition:
                                      lambda: 'return !id(mirroring_cover_settings);'
                                    then:
                                      - homeassistant.action:
                                          action: input_select.select_option
                                          data:
                                            entity_id: input_select.master_bedroom_cover_open_time
                                            option: !lambda |-
                                              std::vector<std::string> options = {
                                                "6:00", "6:30", "7:00", "7:30", "8:00",
                                                "8:30", "9:00", "9:30", "10:00"
                                              };
                                              return options[(int)x];

                          # Midden: Close dropdown (19:00 - 23:00, elk half uur)
                          - dropdown:
                              id: cover_evening_dropdown
                              align: LEFT_MID
                              x: 195
                              y: 0
                              width: 95
                              options:
                                - "19:00"
                                - "19:30"
                                - "20:00"
                                - "20:30"
                                - "21:00"
                                - "21:30"
                                - "22:00"
                                - "22:30"
                                - "23:00"
                              selected_index: 4  # Default: 21:00
                              on_value:
                                # Guard against the mirror-loop caused by
                                # lvgl.dropdown.update firing on_value
                                # (esphome/esphome#17161). Only forward to HA
                                # when this was a genuine user touch, not a
                                # programmatic sync from ha_cover_close_time /
                                # the cover_default_checkbox handler.
                                - if:
                                    condition:
                                      lambda: 'return !id(mirroring_cover_settings);'
                                    then:
                                      - homeassistant.action:
                                          action: input_select.select_option
                                          data:
                                            entity_id: input_select.master_bedroom_cover_close_time
                                            option: !lambda |-
                                              std::vector<std::string> options = {
                                                "19:00", "19:30", "20:00", "20:30", "21:00",
                                                "21:30", "22:00", "22:30", "23:00"
                                              };
                                              return options[(int)x];

                          # Onderaan: Slider (inverted: 0 = open/top, 100 = closed/bottom)
                          - slider:
                              id: cover_slider
                              width: 90%
                              align: BOTTOM_MID
                              y: 0
                              min_value: 0
                              max_value: 100
                              on_release:
                                # Remember the requested target (in HA's
                                # 0=closed/100=open terms) and mark the
                                # position as "pending" so ha_cover_position
                                # won't yank the slider back to the
                                # in-transit current_position while the
                                # cover is still moving. See
                                # cover_position_pending_timeout for the
                                # failsafe that clears this if the target is
                                # never reached.
                                - globals.set:
                                    id: cover_target_position
                                    value: !lambda 'return 100 - (int)x;'
                                - globals.set:
                                    id: cover_position_pending
                                    value: !lambda 'return true;'
                                - script.execute: cover_position_pending_timeout
                                - homeassistant.action:
                                    action: cover.set_cover_position
                                    data:
                                      entity_id: cover.cover_master_bedroom
                                      position: !lambda 'return id(cover_target_position);'
                              
              # =========================
              # RIGHT COLUMN
              # =========================
              - obj:
                  id: right_col
                  scrollable: false
                  scrollbar_mode: "off"

                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH

                  layout:
                    type: GRID
                    pad_row: 8
                    pad_column: 0
                    grid_rows:
                      - FR(1)
                      - FR(1)
                    grid_columns:
                      - FR(1)

                  widgets:

                    # =========================
                    # WEATHER
                    # Weather grid layout (6 rows):
                    #   Row 0: icon (col 0, rowspan 2) | condition name (col 1-3)
                    #   Row 1: icon (col 0, rowspan 2) | current temperature (col 1-3)
                    #   Row 2: Feels like label (col 1-2) | value (col 3)
                    #   Row 3: Cloud label (col 1-2)     | value (col 3)
                    #   Row 4: Humidity label (col 1-2)  | value (col 3)
                    #   Row 5: Wind label (col 1-2)      | value (col 3)
                    # =========================
                    - obj:
                        id: weather_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 10
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        layout:
                          pad_column: 0
                          pad_row: 2
                          type: GRID
                          grid_rows: [FR(25), FR(25), FR(13), FR(13), FR(13), FR(13)]
                          grid_columns: [FR(35), FR(20), FR(20), FR(25)]

                        widgets:

                          # Weather icon (col 0, spans rows 0+1)
                          - label:
                              text: "\U000F14E4"
                              id: lbl_weather_forecast_condition_icon
                              text_font: icons_100
                              text_align: CENTER
                              text_color: 0xFDB813
                              grid_cell_row_pos: 0
                              grid_cell_column_pos: 0
                              grid_cell_row_span: 2
                              grid_cell_x_align: CENTER
                              grid_cell_y_align: CENTER

                          # Condition name (row 0, col 1-3)
                          - label:
                              text: "Unknown"
                              id: lbl_weather_forecast_condition_name
                              text_align: LEFT
                              text_font: montserrat_20
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 0
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 3
                              grid_cell_x_align: START
                              grid_cell_y_align: END

                          # Current temperature (row 1, col 1-3)
                          - label:
                              text: "--.- °C"
                              id: lbl_weather_outdoor_now
                              text_align: LEFT
                              text_font: montserrat_22
                              text_color: 0x2F8CD8
                              grid_cell_row_pos: 1
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 3
                              grid_cell_x_align: START
                              grid_cell_y_align: START

                          # Feels like LABEL
                          - label:
                              text: "Feels like:"
                              text_font: montserrat_14
                              text_color: 0x666666
                              text_align: LEFT
                              grid_cell_row_pos: 2
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 2
                              grid_cell_x_align: START

                          # Feels like VALUE
                          - label:
                              text: "--.- °C"
                              id: lbl_weather_forecast_tempap
                              text_align: LEFT
                              text_font: montserrat_14
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 2
                              grid_cell_column_pos: 3
                              grid_cell_x_align: START

                          # Cloud LABEL
                          - label:
                              text: "Cloud:"
                              text_font: montserrat_14
                              text_color: 0x666666
                              text_align: LEFT
                              grid_cell_row_pos: 3
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 2
                              grid_cell_x_align: START

                          # Cloud VALUE
                          - label:
                              text: "--%"
                              id: lbl_weather_forecast_temphi
                              text_align: LEFT
                              text_font: montserrat_14
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 3
                              grid_cell_column_pos: 3
                              grid_cell_x_align: START

                          # Humidity LABEL
                          - label:
                              text: "Humidity:"
                              text_font: montserrat_14
                              text_color: 0x666666
                              text_align: LEFT
                              grid_cell_row_pos: 4
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 2
                              grid_cell_x_align: START

                          # Humidity VALUE
                          - label:
                              text: "--%"
                              id: lbl_weather_forecast_templo
                              text_align: LEFT
                              text_font: montserrat_14
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 4
                              grid_cell_column_pos: 3
                              grid_cell_x_align: START

                          # Wind LABEL
                          - label:
                              text: "Wind:"
                              text_font: montserrat_14
                              text_color: 0x666666
                              text_align: LEFT
                              grid_cell_row_pos: 5
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 2
                              grid_cell_x_align: START

                          # Wind VALUE
                          - label:
                              text: "-- km/h"
                              id: lbl_weather_wind_speed
                              text_align: LEFT
                              text_font: montserrat_14
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 5
                              grid_cell_column_pos: 3
                              grid_cell_x_align: START

                    # =========================
                    # CLIMATE
                    # =========================
                    - obj:
                        id: climate_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 6
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        widgets:

                          # Title
                          - label:
                              id: climate_title
                              text: "Climate"
                              align: TOP_LEFT
                              x: 10
                              y: 5
                              text_font: montserrat_20
                              text_color: 0x0B0A0A

                          # Huidige kamertemperatuur - rechterbovenhoek
                          - label:
                              text: "Current:"
                              align: TOP_RIGHT
                              x: -65
                              y: 8
                              text_font: montserrat_14
                              text_color: 0x666666

                          - label:
                              id: climate_current_temp
                              text: "-- °C"
                              align: TOP_RIGHT
                              x: -10
                              y: 8
                              text_font: montserrat_14
                              text_color: 0x0B0A0A

                          # Setpoint label (number only, in black bordered box)
                          - label:
                              id: climate_setpoint_label
                              text: "21.0"
                              align: CENTER
                              x: -15
                              y: 0
                              text_align: CENTER
                              text_font: montserrat_22
                              text_color: 0x000000
                              pad_all: 4
                              border_width: 2
                              border_color: 0x000000
                              radius: 4

                          # Degrees unit - outside the bordered box, to its right
                          - label:
                              id: climate_setpoint_unit
                              text: "°C"
                              align: CENTER
                              x: 35
                              y: 0
                              text_font: montserrat_22
                              text_color: 0x000000

                          # + knop links boven setpoint label (custom +0.5)
                          - button:
                              id: climate_temp_increase
                              width: 45
                              height: 35
                              x: 20
                              y: -20
                              align: LEFT_MID
                              widgets:
                                - label:
                                    text: "+"
                                    align: CENTER
                                    text_font: montserrat_22
                              on_click:
                                - globals.set:
                                    id: climate_setpoint_value
                                    value: !lambda |-
                                      float new_value = id(climate_setpoint_value) + 0.5;
                                      if (new_value > 30.0) new_value = 30.0;
                                      return new_value;
                                - lvgl.label.update:
                                    id: climate_setpoint_label
                                    text: !lambda |-
                                      char buf[16];
                                      snprintf(buf, sizeof(buf), "%.1f", id(climate_setpoint_value));
                                      return buf;
                                - delay: 100ms
                                - homeassistant.action:
                                    action: climate.set_temperature
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      temperature: !lambda 'return id(climate_setpoint_value);'

                          # - knop links onder setpoint label (custom -0.5)
                          - button:
                              id: climate_temp_decrease
                              width: 45
                              height: 35
                              x: 20
                              y: 20
                              align: LEFT_MID
                              widgets:
                                - label:
                                    text: "-"
                                    align: CENTER
                                    text_font: montserrat_22
                              on_click:
                                - globals.set:
                                    id: climate_setpoint_value
                                    value: !lambda |-
                                      float new_value = id(climate_setpoint_value) - 0.5;
                                      if (new_value < 15.0) new_value = 15.0;
                                      return new_value;
                                - lvgl.label.update:
                                    id: climate_setpoint_label
                                    text: !lambda |-
                                      char buf[16];
                                      snprintf(buf, sizeof(buf), "%.1f", id(climate_setpoint_value));
                                      return buf;
                                - delay: 100ms
                                - homeassistant.action:
                                    action: climate.set_temperature
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      temperature: !lambda 'return id(climate_setpoint_value);'

                          # Mode buttons onderaan - Off / Eco / Warm
                          - button:
                              id: climate_off_button
                              width: 65
                              height: 35
                              x: -68
                              y: 60
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "Off"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      hvac_mode: "off"

                          - button:
                              id: climate_eco_button
                              width: 65
                              height: 35
                              x: 0
                              y: 60
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "Eco"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      hvac_mode: "heat"
                                - delay: 200ms
                                - homeassistant.action:
                                    action: climate.set_preset_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      preset_mode: "eco"

                          - button:
                              id: climate_warm_button
                              width: 65
                              height: 35
                              x: 68
                              y: 60
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "Warm"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      hvac_mode: "heat"
                                - delay: 200ms
                                - homeassistant.action:
                                    action: climate.set_preset_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      preset_mode: "comfort"

    # =========================
    # SECOND PAGE - LIVING ROOM
    # =========================
    - id: second_page
      bg_color: 0x0B0A0A
      pad_all: 0
      scrollable: false
      scrollbar_mode: "off"

      widgets:

        # =========================
        # HEADER
        # =========================
        - obj:
            align: TOP_MID
            styles: header_footer
            width: 100%
            height: 40
            scrollable: false
            scrollbar_mode: "off"

            widgets:
              - label:
                  text: "Living Room Control"
                  align: CENTER
                  text_font: montserrat_22
                  text_color: 0xFFFFFF

              # WiFi connectivity icon (page 2). LVGL widget ids are
              # per-page, so the main page's lbl_wifistatus can't be
              # reused here - this is a separate widget with its own id
              # that update_connectivity_icons (see lvglsensors.yml)
              # keeps in sync with lbl_wifistatus on the main page.
              - label:
                  text: "\U000F05A9"
                  id: lbl_wifistatus_2
                  align: RIGHT_MID
                  x: -55
                  text_font: icons_24
                  text_color: 0xFFFFFF

              # HA connectivity icon (page 2). Same per-page-id caveat as
              # lbl_wifistatus_2 above; kept in sync with lbl_hastatus on
              # the main page by update_connectivity_icons.
              - label:
                  text: "\U000F07D0"
                  id: lbl_hastatus_2
                  align: RIGHT_MID
                  x: -15
                  text_font: icons_24
                  text_color: 0xFFFFFF

              # Page navigation: go back to Master Bedroom (previous page)
              - button:
                  align: LEFT_MID
                  x: 5
                  width: 40
                  height: 34
                  bg_opa: TRANSP
                  shadow_width: 0
                  widgets:
                    - label:
                        text: "\U000F0141"
                        align: CENTER
                        text_font: icons_24
                        text_color: 0xFFFFFF
                  on_click:
                    - lvgl.page.show: main_page

        # =========================
        # MAIN GRID (second page)
        # =========================
        - obj:
            id: main_grid_2
            x: 0
            y: 40
            width: 800
            height: 440
            bg_color: 0xD3D6D9
            pad_all: 8
            scrollable: false
            scrollbar_mode: "off"

            layout:
              type: GRID
              pad_row: 8
              pad_column: 8
              grid_rows:
                - FR(1)
              grid_columns:
                - FR(1)
                - FR(1)

            widgets:

              # =========================
              # LIVING ROOM LIGHT
              # =========================
              - obj:
                  id: livingroom_light_obj
                  bg_color: 0xFFFFFF
                  radius: 6
                  pad_all: 6
                  scrollable: false
                  scrollbar_mode: "off"

                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH

                  widgets:

                    - label:
                        text: "Living Room Lights"
                        align: TOP_LEFT
                        x: 10
                        y: 5
                        text_font: montserrat_20
                        text_color: 0x0B0A0A

                    # Living room light bulb icon
                    - label:
                        id: lbl_bulb_livingroom
                        text: "\U000F0336"
                        align: CENTER
                        x: -40
                        y: 0
                        text_font: icons_28
                        text_color: 0xBBBBBB

                    - label:
                        text: "Lights"
                        align: CENTER
                        x: 20
                        y: 0
                        text_font: montserrat_16
                        text_color: 0x0B0A0A

                    # Living room light switch.
                    # Calls the centralized script.livingroom_light_toggle in
                    # Home Assistant, which is the single source of truth for
                    # this logic (also used by the "Livingroom Light Button
                    # Toggle" automation triggered by light.livingroom_front_button).
                    # The script correctly toggles light.livingroom_lights and
                    # sets/clears the livingroom_light_dark_lockout and
                    # livingroom_light_force_on helpers, so the display always
                    # stays in sync with the physical wall button behavior.
                    - switch:
                        id: livingroom_light_switch
                        align: CENTER
                        x: 90
                        y: 0
                        shadow_color: 0xFDB813
                        shadow_width: 0
                        shadow_spread: 2
                        on_value:
                          # Guard against the mirror-loop caused by
                          # lvgl.widget.update firing on_value
                          # (esphome/esphome#17161). Only forward to HA
                          # when this was a genuine user touch.
                          - if:
                              condition:
                                lambda: 'return !id(mirroring_light_switches);'
                              then:
                                - homeassistant.action:
                                    action: script.livingroom_light_toggle

              # =========================
              # SCREEN TIMEOUT / NIGHT MODE SETTINGS
              # =========================
              - obj:
                  id: settings_obj
                  bg_color: 0xFFFFFF
                  radius: 6
                  pad_all: 12
                  scrollable: false
                  scrollbar_mode: "off"

                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH

                  widgets:

                    - label:
                        text: "Settings"
                        align: TOP_LEFT
                        x: 0
                        y: 0
                        text_font: montserrat_20
                        text_color: 0x0B0A0A

                    - label:
                        text: "Screen timeout:"
                        align: LEFT_MID
                        x: 0
                        y: -60
                        text_font: montserrat_16
                        text_color: 0x0B0A0A

                    # Screen timeout dropdown (writes to screen_timeout global, in seconds)
                    - dropdown:
                        id: screen_timeout_dropdown
                        align: LEFT_MID
                        x: 150
                        y: -60
                        width: 120
                        options:
                          - "30 sec"
                          - "1 min"
                          - "2 min"
                          - "5 min"
                          - "10 min"
                          - "30 min"
                        selected_index: 3  # Default: 5 min
                        on_value:
                          - globals.set:
                              id: screen_timeout
                              value: !lambda |-
                                int secs[] = {30, 60, 120, 300, 600, 1800};
                                return secs[(int)x];

                    # Night mode: while the current hour falls within
                    # [Night start, Night end), PIR motion will no longer
                    # auto-wake the screen (the ceiling light and touching
                    # the screen still do). See update_screen_state /
                    # night_mode_start_hour / night_mode_end_hour in
                    # lvglsensors.yml. Options are index-aligned to the
                    # hour of day (index 0 = 00:00 ... index 23 = 23:00),
                    # so the selected index can be used directly as the
                    # hour value without a lookup table.
                    - label:
                        text: "Night start:"
                        align: LEFT_MID
                        x: 0
                        y: 0
                        text_font: montserrat_16
                        text_color: 0x0B0A0A

                    - dropdown:
                        id: night_mode_start_dropdown
                        align: LEFT_MID
                        x: 150
                        y: 0
                        width: 100
                        options:
                          - "00:00"
                          - "01:00"
                          - "02:00"
                          - "03:00"
                          - "04:00"
                          - "05:00"
                          - "06:00"
                          - "07:00"
                          - "08:00"
                          - "09:00"
                          - "10:00"
                          - "11:00"
                          - "12:00"
                          - "13:00"
                          - "14:00"
                          - "15:00"
                          - "16:00"
                          - "17:00"
                          - "18:00"
                          - "19:00"
                          - "20:00"
                          - "21:00"
                          - "22:00"
                          - "23:00"
                        selected_index: 22  # Default: 22:00
                        on_value:
                          - globals.set:
                              id: night_mode_start_hour
                              value: !lambda 'return (int)x;'
                          - script.execute: update_screen_state

                    - label:
                        text: "Night end:"
                        align: LEFT_MID
                        x: 0
                        y: 60
                        text_font: montserrat_16
                        text_color: 0x0B0A0A

                    - dropdown:
                        id: night_mode_end_dropdown
                        align: LEFT_MID
                        x: 150
                        y: 60
                        width: 100
                        options:
                          - "00:00"
                          - "01:00"
                          - "02:00"
                          - "03:00"
                          - "04:00"
                          - "05:00"
                          - "06:00"
                          - "07:00"
                          - "08:00"
                          - "09:00"
                          - "10:00"
                          - "11:00"
                          - "12:00"
                          - "13:00"
                          - "14:00"
                          - "15:00"
                          - "16:00"
                          - "17:00"
                          - "18:00"
                          - "19:00"
                          - "20:00"
                          - "21:00"
                          - "22:00"
                          - "23:00"
                        selected_index: 7  # Default: 07:00
                        on_value:
                          - globals.set:
                              id: night_mode_end_hour
                              value: !lambda 'return (int)x;'
                          - script.execute: update_screen_state
  
  # =========================
  # STYLE DEFINITIONS
  # =========================
  style_definitions:
    - id: header_footer
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_opa: TRANSP
      radius: 0
      pad_all: 0
      pad_row: 0
      pad_column: 0
      border_color: 0x0077b3
      text_color: 0xFFFFFF
      width: 100%
      height: 30
