# Read by the ESPHome Fleet add-on. Do not remove.
# esphome-fleet:
#   schedule: 0 10 * * 1
#   schedule_enabled: false
#   schedule_tz: Europe/Amsterdam
#   schedule_last_run: '2026-04-28T08:00:00.862688+00:00'

substitutions:
  device_name: display
  friendly_name: display
  device_description: lvgl display

esphome:
  name: '${device_name}'
  friendly_name: '${friendly_name}'
  comment: '${device_description}'
  platformio_options:
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: "BarBaar_IoT"
  password: !secret wifipass
  fast_connect: on
  power_save_mode: light
  ap:
    ssid: 'Display Fallback Hotspot'
    password: '!paniek!'

logger:

ota:
  platform: esphome

captive_portal:

# Enable Home Assistant API
api:
  encryption:
    key: "kpsAzWAiBQmEW0IdGoduMdhKiQjFV7YIPrYXjXFTD1I="
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus
       
#Enable web server      
web_server:
  port: 80

# Define a PWM output on the ESP32
output:
  - platform: ledc
    pin: 2
    frequency: 1220
    id: gpio_backlight_pwm

light:
  - platform: monochromatic # Define a monochromatic, dimmable light for the backlight
    output: gpio_backlight_pwm
    name: ${device_name} Display Backlight
    id: back_light
    restore_mode: ALWAYS_ON

display:
  - platform: rpi_dpi_rgb
    id: main_display
    color_order: RGB
    invert_colors: True
    update_interval: never
    auto_clear_enabled: false # takes 2.8 seconds to clear the display
    dimensions:
      width: 800
      height: 480
    de_pin: 40
    hsync_pin: 39
    vsync_pin: 41
    pclk_pin: 0
    pclk_frequency: 12MHz
    data_pins:
      red:
        - 45 #r1
        - 48 #r2
        - 47 #r3
        - 21 #r4
        - 14 #r5
      green:
        - 5 #g0
        - 6 #g1
        - 7 #g2
        - 15 #g3
        - 16 #g4
        - 4 #g5
      blue:
        - 8 #b1
        - 3 #b2
        - 46 #b3
        - 9 #b4
        - 1 #b5

i2c:
  sda: GPIO19
  scl: GPIO20
  scan: true

touchscreen:
  platform: gt911

globals:
  - id: climate_setpoint_value
    type: float
    restore_value: no
    initial_value: '21.0'

# =========================
# FONTS (buiten lvgl sectie!)
# =========================
font:
  # Klein icoon voor HA status in header
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_24
    size: 24
    bpp: 4
    glyphs: [
      "\U000F05A9", # home-assistant icon
      ]
  
  # Groot icoon voor weather widget
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: icons_100
    size: 100
    bpp: 4
    glyphs: [
      "\U000F0594", # clear-night
      "\U000F0590", # cloudy
      "\U000F0F2F", # exceptional
      "\U000F0591", # fog
      "\U000F0592", # hail
      "\U000F0593", # lightning
      "\U000F067E", # lightning-rainy
      "\U000F0595", # partlycloudy
      "\U000F0596", # pouring
      "\U000F0597", # rainy
      "\U000F0598", # snowy
      "\U000F067F", # snowy-rainy
      "\U000F0599", # sunny
      "\U000F059D", # windy
      "\U000F059E", # windy-variant
      "\U000F14E4", # sunny-off
      ]
  
  - file: "gfonts://Montserrat@500"
    id: montserrat_14
    size: 14
    bpp: 4
  
  - file: "gfonts://Montserrat@500"
    id: montserrat_16
    size: 16
    bpp: 4

  - file: "gfonts://Montserrat@500"
    id: montserrat_20
    size: 20
    bpp: 4

  - file: "gfonts://Montserrat@500"
    id: montserrat_22
    size: 22
    bpp: 4

# =========================
# LVGL
# =========================
lvgl:
  pages:
    - id: main_page
      bg_color: 0x0B0A0A
      pad_all: 0
      scrollable: false
      scrollbar_mode: "off"

      widgets:

        # =========================
        # HEADER (kleiner HA icoon)
        # =========================
        - obj:
            align: TOP_MID
            styles: header_footer
            width: 100%
            height: 40
            scrollable: false
            scrollbar_mode: "off"

            widgets:
              - label:
                  text: "Master Bedroom Control"
                  align: CENTER
                  text_font: montserrat_22
                  text_color: 0xFFFFFF

              - label:
                  text: "\U000F05A9"
                  id: lbl_hastatus
                  hidden: true
                  align: RIGHT_MID
                  x: -10
                  text_font: icons_24
                  text_color: 0xFFFFFF


        # =========================
        # MAIN GRID
        # =========================
        - obj:
            id: main_grid
            x: 0
            y: 40
            width: 800
            height: 440
            bg_color: 0xD3D6D9
            pad_all: 8
            scrollable: false
            scrollbar_mode: "off"

            layout:
              type: GRID
              pad_row: 8
              pad_column: 8
              grid_rows:
                - FR(1)
              grid_columns:
                - FR(1)
                - FR(1)

            widgets:

              # =========================
              # LEFT COLUMN
              # =========================
              - obj:
                  id: left_col
                  scrollable: false
                  scrollbar_mode: "off"

                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 0
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH

                  layout:
                    type: GRID
                    pad_row: 8
                    pad_column: 0
                    grid_rows:
                      - FR(1)
                      - FR(1)
                      - FR(1)
                    grid_columns:
                      - FR(1)

                  widgets:

                    # =========================
                    # MAIN LIGHT
                    # =========================
                    - obj:
                        id: light_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 6
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        widgets:

                          - label:
                              id: main_light_title
                              text: "Main Light"
                              align: TOP_LEFT
                              x: 10
                              y: 5
                              text_font: montserrat_20
                              text_color: 0x0B0A0A

                          # Main switch (plafondlamp)
                          - label:
                              text: "Main"
                              align: CENTER
                              x: 60
                              y: -30
                              text_font: montserrat_16
                              text_color: 0x0B0A0A

                          - switch:
                              id: main_light_switch_main
                              align: CENTER
                              x: 130
                              y: -30
                              on_value:
                                - homeassistant.action:
                                    action: light.toggle
                                    data:
                                      entity_id: light.sonoff_ifan_ifan03_masterbedroom_light

                          # Left switch (linker bedlamp)
                          - label:
                              text: "Left"
                              align: CENTER
                              x: 60
                              y: 5
                              text_font: montserrat_16
                              text_color: 0x0B0A0A

                          - switch:
                              id: main_light_switch_left
                              align: CENTER
                              x: 130
                              y: 5
                              on_value:
                                - homeassistant.action:
                                    action: light.toggle
                                    data:
                                      entity_id: light.master_bedroom_light_left

                          # Right switch (rechter bedlamp)
                          - label:
                              text: "Right"
                              align: CENTER
                              x: 60
                              y: 40
                              text_font: montserrat_16
                              text_color: 0x0B0A0A

                          - switch:
                              id: main_light_switch_right
                              align: CENTER
                              x: 130
                              y: 40
                              on_value:
                                - homeassistant.action:
                                    action: light.toggle
                                    data:
                                      entity_id: light.master_bedroom_light_right

                    # =========================
                    # VENTILATOR
                    # =========================
                    - obj:
                        id: ventilator_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 6
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        widgets:

                          - label:
                              id: ventilator_title
                              text: "Ventilator"
                              align: TOP_LEFT
                              x: 10
                              y: 5
                              text_font: montserrat_20
                              text_color: 0x0B0A0A

                          # OFF button
                          - button:
                              id: fan_off_button
                              width: 75
                              height: 45
                              x: -123
                              y: 25
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "OFF"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: fan.turn_off
                                    data:
                                      entity_id: fan.sonoff_ifan_ifan03_masterbedroom

                          # LOW button (33%)
                          - button:
                              id: fan_low_button
                              width: 75
                              height: 45
                              x: -41
                              y: 25
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "LOW"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: fan.set_percentage
                                    data:
                                      entity_id: fan.sonoff_ifan_ifan03_masterbedroom
                                      percentage: "33"

                          # MID button (66%)
                          - button:
                              id: fan_mid_button
                              width: 75
                              height: 45
                              x: 41
                              y: 25
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "MID"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: fan.set_percentage
                                    data:
                                      entity_id: fan.sonoff_ifan_ifan03_masterbedroom
                                      percentage: "66"

                          # HIGH button (100%)
                          - button:
                              id: fan_high_button
                              width: 75
                              height: 45
                              x: 123
                              y: 25
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "HIGH"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: fan.set_percentage
                                    data:
                                      entity_id: fan.sonoff_ifan_ifan03_masterbedroom
                                      percentage: "100"


                    # =========================
                    # COVER
                    # =========================
                    - obj:
                        id: cover_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 12
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 2
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        widgets:

                          # Linksboven: Label "Cover"
                          - label:
                              id: cover_title
                              text: "Cover"
                              align: TOP_LEFT
                              x: 0
                              y: 0
                              text_font: montserrat_20
                              text_color: 0x0B0A0A

                          # Midden: Checkbox "Default"
                          - checkbox:
                              id: cover_default_checkbox
                              align: LEFT_MID
                              x: 0
                              y: 0
                              text: "Default"
                              text_font: montserrat_14
                              on_value:
                                - homeassistant.action:
                                    action: input_boolean.toggle
                                    data:
                                      entity_id: input_boolean.master_bedroom_cover_default_times

                          # Midden: Open dropdown (6:00 - 10:00, elk half uur)
                          - dropdown:
                              id: cover_morning_dropdown
                              align: LEFT_MID
                              x: 100
                              y: 0
                              width: 85
                              options:
                                - "6:00"
                                - "6:30"
                                - "7:00"
                                - "7:30"
                                - "8:00"
                                - "8:30"
                                - "9:00"
                                - "9:30"
                                - "10:00"
                              selected_index: 4  # Default: 8:00
                              on_value:
                                - homeassistant.action:
                                    action: input_select.select_option
                                    data:
                                      entity_id: input_select.master_bedroom_cover_open_time
                                      option: !lambda |-
                                        std::vector<std::string> options = {
                                          "6:00", "6:30", "7:00", "7:30", "8:00",
                                          "8:30", "9:00", "9:30", "10:00"
                                        };
                                        return options[(int)x];

                          # Midden: Close dropdown (19:00 - 23:00, elk half uur)
                          - dropdown:
                              id: cover_evening_dropdown
                              align: LEFT_MID
                              x: 195
                              y: 0
                              width: 95
                              options:
                                - "19:00"
                                - "19:30"
                                - "20:00"
                                - "20:30"
                                - "21:00"
                                - "21:30"
                                - "22:00"
                                - "22:30"
                                - "23:00"
                              selected_index: 4  # Default: 21:00
                              on_value:
                                - homeassistant.action:
                                    action: input_select.select_option
                                    data:
                                      entity_id: input_select.master_bedroom_cover_close_time
                                      option: !lambda |-
                                        std::vector<std::string> options = {
                                          "19:00", "19:30", "20:00", "20:30", "21:00",
                                          "21:30", "22:00", "22:30", "23:00"
                                        };
                                        return options[(int)x];

                          # Onderaan: Slider
                          - slider:
                              id: cover_slider
                              width: 90%
                              align: BOTTOM_MID
                              y: 0
                              min_value: 0
                              max_value: 100
                              on_release:
                                - homeassistant.action:
                                    action: cover.set_cover_position
                                    data:
                                      entity_id: cover.cover_master_bedroom
                                      position: !lambda 'return (int)x;'
                              
              # =========================
              # RIGHT COLUMN
              # =========================
              - obj:
                  id: right_col
                  scrollable: false
                  scrollbar_mode: "off"

                  grid_cell_row_pos: 0
                  grid_cell_column_pos: 1
                  grid_cell_x_align: STRETCH
                  grid_cell_y_align: STRETCH

                  layout:
                    type: GRID
                    pad_row: 8
                    pad_column: 0
                    grid_rows:
                      - FR(1)
                      - FR(1)
                    grid_columns:
                      - FR(1)

                  widgets:

                    # =========================
                    # WEATHER
                    # Weather grid layout (6 rows):
                    #   Row 0: icon (col 0, rowspan 2) | condition name (col 1-3)
                    #   Row 1: icon (col 0, rowspan 2) | current temperature (col 1-3)
                    #   Row 2: Feels like label (col 1-2) | value (col 3)
                    #   Row 3: Cloud label (col 1-2)     | value (col 3)
                    #   Row 4: Humidity label (col 1-2)  | value (col 3)
                    #   Row 5: Wind label (col 1-2)      | value (col 3)
                    # =========================
                    - obj:
                        id: weather_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 10
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        layout:
                          pad_column: 0
                          pad_row: 2
                          type: GRID
                          grid_rows: [FR(25), FR(25), FR(13), FR(13), FR(13), FR(13)]
                          grid_columns: [FR(35), FR(20), FR(20), FR(25)]

                        widgets:

                          # Weather icon (col 0, spans rows 0+1)
                          - label:
                              text: "\U000F14E4"
                              id: lbl_weather_forecast_condition_icon
                              text_font: icons_100
                              text_align: CENTER
                              text_color: 0xFDB813
                              grid_cell_row_pos: 0
                              grid_cell_column_pos: 0
                              grid_cell_row_span: 2
                              grid_cell_x_align: CENTER
                              grid_cell_y_align: CENTER

                          # Condition name (row 0, col 1-3)
                          - label:
                              text: "Unknown"
                              id: lbl_weather_forecast_condition_name
                              text_align: LEFT
                              text_font: montserrat_20
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 0
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 3
                              grid_cell_x_align: START
                              grid_cell_y_align: END

                          # Current temperature (row 1, col 1-3)
                          - label:
                              text: "--.- °C"
                              id: lbl_weather_outdoor_now
                              text_align: LEFT
                              text_font: montserrat_22
                              text_color: 0x2F8CD8
                              grid_cell_row_pos: 1
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 3
                              grid_cell_x_align: START
                              grid_cell_y_align: START

                          # Feels like LABEL
                          - label:
                              text: "Feels like:"
                              text_font: montserrat_14
                              text_color: 0x666666
                              text_align: LEFT
                              grid_cell_row_pos: 2
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 2
                              grid_cell_x_align: START

                          # Feels like VALUE
                          - label:
                              text: "--.- °C"
                              id: lbl_weather_forecast_tempap
                              text_align: LEFT
                              text_font: montserrat_14
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 2
                              grid_cell_column_pos: 3
                              grid_cell_x_align: START

                          # Cloud LABEL
                          - label:
                              text: "Cloud:"
                              text_font: montserrat_14
                              text_color: 0x666666
                              text_align: LEFT
                              grid_cell_row_pos: 3
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 2
                              grid_cell_x_align: START

                          # Cloud VALUE
                          - label:
                              text: "--%"
                              id: lbl_weather_forecast_temphi
                              text_align: LEFT
                              text_font: montserrat_14
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 3
                              grid_cell_column_pos: 3
                              grid_cell_x_align: START

                          # Humidity LABEL
                          - label:
                              text: "Humidity:"
                              text_font: montserrat_14
                              text_color: 0x666666
                              text_align: LEFT
                              grid_cell_row_pos: 4
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 2
                              grid_cell_x_align: START

                          # Humidity VALUE
                          - label:
                              text: "--%"
                              id: lbl_weather_forecast_templo
                              text_align: LEFT
                              text_font: montserrat_14
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 4
                              grid_cell_column_pos: 3
                              grid_cell_x_align: START

                          # Wind LABEL
                          - label:
                              text: "Wind:"
                              text_font: montserrat_14
                              text_color: 0x666666
                              text_align: LEFT
                              grid_cell_row_pos: 5
                              grid_cell_column_pos: 1
                              grid_cell_column_span: 2
                              grid_cell_x_align: START

                          # Wind VALUE
                          - label:
                              text: "-- km/h"
                              id: lbl_weather_wind_speed
                              text_align: LEFT
                              text_font: montserrat_14
                              text_color: 0x0B0A0A
                              grid_cell_row_pos: 5
                              grid_cell_column_pos: 3
                              grid_cell_x_align: START

                    # =========================
                    # CLIMATE
                    # =========================
                    - obj:
                        id: climate_obj
                        bg_color: 0xFFFFFF
                        radius: 6
                        pad_all: 6
                        scrollable: false
                        scrollbar_mode: "off"

                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 0
                        grid_cell_x_align: STRETCH
                        grid_cell_y_align: STRETCH

                        widgets:

                          # Title
                          - label:
                              id: climate_title
                              text: "Climate"
                              align: TOP_LEFT
                              x: 10
                              y: 5
                              text_font: montserrat_20
                              text_color: 0x0B0A0A

                          # Huidige kamertemperatuur - rechterbovenhoek
                          - label:
                              text: "Current:"
                              align: TOP_RIGHT
                              x: -65
                              y: 8
                              text_font: montserrat_14
                              text_color: 0x666666

                          - label:
                              id: climate_current_temp
                              text: "-- °C"
                              align: TOP_RIGHT
                              x: -10
                              y: 8
                              text_font: montserrat_14
                              text_color: 0x0B0A0A

                          # Setpoint label (replaces spinbox)
                          - label:
                              id: climate_setpoint_label
                              text: "21.0 °C"
                              align: CENTER
                              y: 0
                              text_align: CENTER
                              text_font: montserrat_20
                              text_color: 0x2F8CD8

                          # + knop links boven setpoint label (custom +0.5)
                          - button:
                              id: climate_temp_increase
                              width: 45
                              height: 35
                              x: 20
                              y: -20
                              align: LEFT_MID
                              widgets:
                                - label:
                                    text: "+"
                                    align: CENTER
                                    text_font: montserrat_22
                              on_click:
                                - globals.set:
                                    id: climate_setpoint_value
                                    value: !lambda |-
                                      float new_value = id(climate_setpoint_value) + 0.5;
                                      if (new_value > 30.0) new_value = 30.0;
                                      return new_value;
                                - lvgl.label.update:
                                    id: climate_setpoint_label
                                    text: !lambda |-
                                      char buf[16];
                                      snprintf(buf, sizeof(buf), "%.1f °C", id(climate_setpoint_value));
                                      return buf;
                                - delay: 100ms
                                - homeassistant.action:
                                    action: climate.set_temperature
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      temperature: !lambda 'return id(climate_setpoint_value);'

                          # - knop links onder setpoint label (custom -0.5)
                          - button:
                              id: climate_temp_decrease
                              width: 45
                              height: 35
                              x: 20
                              y: 20
                              align: LEFT_MID
                              widgets:
                                - label:
                                    text: "-"
                                    align: CENTER
                                    text_font: montserrat_22
                              on_click:
                                - globals.set:
                                    id: climate_setpoint_value
                                    value: !lambda |-
                                      float new_value = id(climate_setpoint_value) - 0.5;
                                      if (new_value < 15.0) new_value = 15.0;
                                      return new_value;
                                - lvgl.label.update:
                                    id: climate_setpoint_label
                                    text: !lambda |-
                                      char buf[16];
                                      snprintf(buf, sizeof(buf), "%.1f °C", id(climate_setpoint_value));
                                      return buf;
                                - delay: 100ms
                                - homeassistant.action:
                                    action: climate.set_temperature
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      temperature: !lambda 'return id(climate_setpoint_value);'

                          # Mode buttons onderaan - Off / Eco / Warm
                          - button:
                              id: climate_off_button
                              width: 65
                              height: 35
                              x: -68
                              y: 60
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "Off"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      hvac_mode: "off"

                          - button:
                              id: climate_eco_button
                              width: 65
                              height: 35
                              x: 0
                              y: 60
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "Eco"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      hvac_mode: "heat"
                                - delay: 200ms
                                - homeassistant.action:
                                    action: climate.set_preset_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      preset_mode: "eco"

                          - button:
                              id: climate_warm_button
                              width: 65
                              height: 35
                              x: 68
                              y: 60
                              align: CENTER
                              checkable: true
                              widgets:
                                - label:
                                    text: "Warm"
                                    align: CENTER
                                    text_font: montserrat_14
                              on_click:
                                - homeassistant.action:
                                    action: climate.set_hvac_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      hvac_mode: "heat"
                                - delay: 200ms
                                - homeassistant.action:
                                    action: climate.set_preset_mode
                                    data:
                                      entity_id: climate.virtual_thermostat_master_bedroom
                                      preset_mode: "comfort"
  
  # =========================
  # STYLE DEFINITIONS
  # =========================
  style_definitions:
    - id: header_footer
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_opa: TRANSP
      radius: 0
      pad_all: 0
      pad_row: 0
      pad_column: 0
      border_color: 0x0077b3
      text_color: 0xFFFFFF
      width: 100%
      height: 30

# =========================
# WEATHER DATA FROM HOME ASSISTANT (OpenWeatherMap)
# =========================

text_sensor:
  # Weather condition
  - platform: homeassistant
    id: ha_weather_condition
    entity_id: weather.openweathermap
    on_value:
      then:
        # Update condition name (capitalize first letter)
        - lvgl.label.update:
            id: lbl_weather_forecast_condition_name
            text: !lambda |-
              std::string condition = x;
              if (!condition.empty()) {
                condition[0] = toupper(condition[0]);
              }
              return condition.c_str();
        
        # Update weather icon
        - lvgl.label.update:
            id: lbl_weather_forecast_condition_icon
            text: !lambda |-
              std::map<std::string, std::string> weather_icons = {
                {"clear-night", "\U000F0594"},
                {"cloudy", "\U000F0590"},
                {"exceptional", "\U000F0F2F"},
                {"fog", "\U000F0591"},
                {"hail", "\U000F0592"},
                {"lightning", "\U000F0593"},
                {"lightning-rainy", "\U000F067E"},
                {"partlycloudy", "\U000F0595"},
                {"pouring", "\U000F0596"},
                {"rainy", "\U000F0597"},
                {"snowy", "\U000F0598"},
                {"snowy-rainy", "\U000F067F"},
                {"sunny", "\U000F0599"},
                {"windy", "\U000F059D"},
                {"windy-variant", "\U000F059E"}
              };
              
              std::string condition = x;
              if (weather_icons.count(condition)) {
                return weather_icons[condition].c_str();
              }
              return "\U000F0599";

  # Cover Open Time helper sync
  - platform: homeassistant
    id: ha_cover_open_time
    entity_id: input_select.master_bedroom_cover_open_time
    on_value:
      then:
        - lvgl.dropdown.update:
            id: cover_morning_dropdown
            selected_index: !lambda |-
              std::vector<std::string> options = {
                "6:00", "6:30", "7:00", "7:30", "8:00",
                "8:30", "9:00", "9:30", "10:00"
              };
              for (size_t i = 0; i < options.size(); i++) {
                if (options[i] == x) return (int)i;
              }
              return 4;  // Default 8:00

  # Cover Close Time helper sync
  - platform: homeassistant
    id: ha_cover_close_time
    entity_id: input_select.master_bedroom_cover_close_time
    on_value:
      then:
        - lvgl.dropdown.update:
            id: cover_evening_dropdown
            selected_index: !lambda |-
              std::vector<std::string> options = {
                "19:00", "19:30", "20:00", "20:30", "21:00",
                "21:30", "22:00", "22:30", "23:00"
              };
              for (size_t i = 0; i < options.size(); i++) {
                if (options[i] == x) return (int)i;
              }
              return 4;  // Default 21:00

  # Climate HVAC mode sync
  - platform: homeassistant
    id: ha_climate_hvac_mode
    entity_id: climate.virtual_thermostat_master_bedroom
    on_value:
      then:
        # Reset all mode buttons
        - lvgl.widget.update:
            id: climate_off_button
            state:
              checked: false
        - lvgl.widget.update:
            id: climate_eco_button
            state:
              checked: false
        - lvgl.widget.update:
            id: climate_warm_button
            state:
              checked: false
        # Highlight Off button if hvac_mode is off
        - if:
            condition:
              lambda: 'return x == "off";'
            then:
              - lvgl.widget.update:
                  id: climate_off_button
                  state:
                    checked: true

  # Climate preset mode sync
  - platform: homeassistant
    id: ha_climate_preset_mode
    entity_id: climate.virtual_thermostat_master_bedroom
    attribute: preset_mode
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "eco";'
            then:
              - lvgl.widget.update:
                  id: climate_eco_button
                  state:
                    checked: true
              - lvgl.widget.update:
                  id: climate_warm_button
                  state:
                    checked: false
        - if:
            condition:
              lambda: 'return x == "comfort";'
            then:
              - lvgl.widget.update:
                  id: climate_warm_button
                  state:
                    checked: true
              - lvgl.widget.update:
                  id: climate_eco_button
                  state:
                    checked: false

# =========================
