substitutions:
  device_name: display
  friendly_name: display
  device_description: lvgl display

esphome:
  name: '${device_name}'
  friendly_name: '${friendly_name}'
  comment: '${device_description}'
  platformio_options:
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    # Sync the screen timeout dropdown to the restored global value.
    # Priority -100 runs late, after LVGL is set up.
    priority: -100
    then:
      - delay: 2s
      - lvgl.dropdown.update:
          id: screen_timeout_dropdown
          selected_index: !lambda |-
            int secs[] = {30, 60, 120, 300, 600, 1800};
            for (int i = 0; i < 6; i++) {
              if (secs[i] == id(screen_timeout)) return i;
            }
            return 3;  // Default 5 min

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

logger:

# Enable Home Assistant API
api:
  encryption:
    key: "kpsAzWAiBQmEW0IdGoduMdhKiQjFV7YIPrYXjXFTD1I="
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.show: lbl_hastatus
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lvgl.widget.hide: lbl_hastatus
       
#Enable web server      
web_server:
  port: 80

globals:
  - id: climate_setpoint_value
    type: float
    restore_value: no
    initial_value: '21.0'

  # Screen inactivity timeout in seconds (default 300 = 5 minutes)
  - id: screen_timeout
    type: int
    restore_value: yes
    initial_value: '300'

packages:
  Generic_config:
    url: https://github.com/BarBaar44/ESPHome
    files: [generic/wifi.yml, generic/generic_sensors.yml, LVGL/display.yml, LVGL/displayconfig.yml, LVGL/lvglconfig.yml, LVGL/lvglsensors.yml]
    refresh: 1min
