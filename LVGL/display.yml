# =========================
# FAN STATE FROM HOME ASSISTANT
# =========================
sensor:
  # Fan percentage status sync
  - platform: homeassistant
    id: ha_fan_percentage
    entity_id: fan.sonoff_ifan_ifan03_masterbedroom
    attribute: percentage
    on_value:
      then:
        # Reset all buttons to default style first
        - lvgl.widget.update:
            id: fan_off_button
            state:
              checked: false
            bg_color: 0x444444
            bg_opa: COVER
        - lvgl.widget.update:
            id: fan_low_button
            state:
              checked: false
            bg_color: 0x444444
            bg_opa: COVER
        - lvgl.widget.update:
            id: fan_mid_button
            state:
              checked: false
            bg_color: 0x444444
            bg_opa: COVER
        - lvgl.widget.update:
            id: fan_high_button
            state:
              checked: false
            bg_color: 0x444444
            bg_opa: COVER
        # Then highlight the active one in red
        - if:
            condition:
              lambda: 'return x <= 5;'  # OFF (0% or near)
            then:
              - lvgl.widget.update:
                  id: fan_off_button
                  state:
                    checked: true
                  bg_color: 0xFF0000
                  bg_opa: COVER
        - if:
            condition:
              lambda: 'return x > 5 && x <= 40;'  # LOW (33%)
            then:
              - lvgl.widget.update:
                  id: fan_low_button
                  state:
                    checked: true
                  bg_color: 0xFF0000
                  bg_opa: COVER
        - if:
            condition:
              lambda: 'return x > 40 && x <= 75;'  # MID (66%)
            then:
              - lvgl.widget.update:
                  id: fan_mid_button
                  state:
                    checked: true
                  bg_color: 0xFF0000
                  bg_opa: COVER
        - if:
            condition:
              lambda: 'return x > 75;'  # HIGH (100%)
            then:
              - lvgl.widget.update:
                  id: fan_high_button
                  state:
                    checked: true
                  bg_color: 0xFF0000
                  bg_opa: COVER

  # Current temperature (Now)
  - platform: homeassistant
    id: ha_weather_temp_now
    entity_id: weather.openweathermap
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_outdoor_now
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f °C", x);
              return buf;

  # Feels like temperature
  - platform: homeassistant
    id: ha_weather_feels_like
    entity_id: weather.openweathermap
    attribute: apparent_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_forecast_tempap
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f °C", x);
              return buf;

  # Cloud coverage for Maximum field
  - platform: homeassistant
    id: ha_weather_cloud
    entity_id: weather.openweathermap
    attribute: cloud_coverage
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_forecast_temphi
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%d%%", (int)x);
              return buf;

  # Humidity for Minimum field
  - platform: homeassistant
    id: ha_weather_humidity
    entity_id: weather.openweathermap
    attribute: humidity
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_forecast_templo
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%d%%", (int)x);
              return buf;

    # Wind bearing (richting in graden)
  # Wind speed
  - platform: homeassistant
    id: ha_weather_wind_speed
    entity_id: weather.openweathermap
    attribute: wind_speed
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_weather_wind_speed
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f km/h", x);
              return buf;

  # Cover position sync from HA
  - platform: homeassistant
    id: ha_cover_position
    entity_id: cover.cover_master_bedroom
    attribute: current_position
    on_value:
      then:
        - lvgl.slider.update:
            id: cover_slider
            value: !lambda 'return (int)x;'

  # Climate setpoint sync from HA → Display
  - platform: homeassistant
    id: ha_climate_setpoint
    entity_id: climate.virtual_thermostat_master_bedroom
    attribute: temperature
    on_value:
      then:
        - globals.set:
            id: climate_setpoint_value
            value: !lambda 'return x;'
        - lvgl.label.update:
            id: climate_setpoint_label
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f °C", x);
              return buf;

  # Current temperature
  - platform: homeassistant
    id: ha_climate_current_temp
    entity_id: climate.virtual_thermostat_master_bedroom
    attribute: current_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: climate_current_temp
            text: !lambda |-
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f °C", x);
              return buf;
